#ci for hello world
name: hello world CI


on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  #build the application using maven
  build:
    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v2

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: build with maven
      run: mvn clean install

    #upload the war file as an artifact to be used in the containerize job
    - name: Upload WAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: webapp-war
        path: webapp/target/*.war
        if-no-files-found: error
    
  #containerize the application using docker
  containerize:

    runs-on: ubuntu-latest
    #copy the war file from the build job to the containerize job
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
    - name: checkout code
      uses: actions/checkout@v2
    
      #Download the war file from the build job
    - name: Download WAR artifact
      uses: actions/download-artifact@v5
      with:
        name: webapp-war
        path: webapp/target

    - name: Build Docker image
      run: docker build -t hello-world-app .

    #configure the aws credentials to push the docker image to amazon ecr
    - name: Configure AWS Credentials 1
      id: creds
      uses: aws-actions/configure-aws-credentials@v6.1.0
      with:
        #uses the aws access key and secret access key from the github secrets
        audience: sts.amazonaws.com
        role-to-assume: arn:aws:iam::134448505602:role/hello-world-github-role
        aws-region: ap-south-1
        output-credentials: true

    - name: get caller identity 1
      run: aws sts get-caller-identity

    - name: Configure AWS Credentials 2
      uses: aws-actions/configure-aws-credentials@v6.1.0
      with:
        aws-region: ap-south-1
        role-to-assume: arn:aws:iam::134448505602:role/hello-world-github-role

    #login to amazon ecr using the aws credentials configured in the previous step
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    #push the docker image to amazon ecr
    - name: Push Docker image to Amazon ECR
      env:
        REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        REPOSITORY: hello-world-app
        IMAGE_TAG: latest
      run: |
        docker tag hello-world-app:latest $REGISTRY/$REPOSITORY:$IMAGE_TAG
        docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG